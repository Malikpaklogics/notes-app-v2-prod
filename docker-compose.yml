version: '3.8'
services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
  server:
    build: ./server
    ports:
      - '5000:5000'
    environment:
      MONGODB_URI: mongodb://mongodb:27017/notes_db
  client:
    build: ./client
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:5000
